<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 감정 일기 - 오늘의 마음 기록과 따뜻한 AI 공감 분석 서비스">
  <title>AI 감정 일기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <main class="diary-card">
      <!-- Auth Header Section -->
      <div class="auth-header-row">
        <div id="auth-status-container" class="auth-status-container">
          <button id="btn-open-auth" class="btn btn-auth-trigger">로그인 / 회원가입</button>
        </div>
      </div>

      <!-- Header Title Section -->
      <header class="header">
        <h1>오늘의 하루는 어땠나요?</h1>
        <p>오늘 있었던 일이나 마음에 머문 감정들을 자유롭게 적어보세요.</p>
      </header>

      <!-- Main Input & Interaction Section -->
      <section class="diary-form">
        <div class="input-group">
          <textarea 
            id="diary-textarea" 
            class="diary-textarea" 
            placeholder="여기에 오늘 하루 있었던 일이나 느꼈던 감정을 적어주세요. 마이크 버튼을 눌러 말로 편리하게 입력할 수도 있습니다..."
            spellcheck="false"
          ></textarea>
          <div class="textarea-hint">자유로운 형식으로 마음 편히 남겨주세요.</div>
        </div>

        <!-- Buttons Row -->
        <div class="button-row">
          <button id="btn-voice" class="btn btn-voice" title="음성으로 일기 작성하기">
            <!-- Mic Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
            <span>음성으로 입력하기</span>
          </button>
          
          <button id="btn-analysis" class="btn btn-analysis" title="감정 분석 요청하기">
            <!-- Sparkles/Analyze Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
            </svg>
            <span>분석 요청하기</span>
          </button>
        </div>
      </section>

      <!-- AI Response Section -->
      <section class="ai-section">
        <div class="ai-subtitle-group">
          <!-- Sparkle subtitle icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
          </svg>
          <h2 class="ai-subtitle">AI의 답변</h2>
        </div>
        <div id="ai-response-box" class="ai-response-box">
          <div id="ai-response-text" class="ai-response-text">여기에 AI의 답변이 표시됩니다.</div>
        </div>
      </section>

      <!-- History Section -->
      <section class="history-section">
        <div class="history-subtitle-group">
          <!-- Clock/History Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <h2 class="history-subtitle">나의 일기 히스토리</h2>
        </div>
        <div id="history-container" class="history-container">
          <!-- History cards will be rendered here dynamically -->
        </div>
      </section>
    </main>
  </div>

  <!-- Auth Modal Overlay -->
  <div id="auth-modal" class="modal-overlay hidden">
    <div class="modal-content auth-card">
      <button id="btn-close-auth" class="btn-close-modal" title="닫기">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      
      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active">로그인</button>
        <button id="tab-signup" class="auth-tab">회원가입</button>
      </div>
      
      <!-- Login Form -->
      <form id="form-login" class="auth-form">
        <div class="auth-input-group">
          <label for="login-email">이메일 주소</label>
          <input type="email" id="login-email" required placeholder="example@email.com">
        </div>
        <div class="auth-input-group">
          <label for="login-password">비밀번호</label>
          <input type="password" id="login-password" required placeholder="비밀번호를 입력하세요">
        </div>
        <button type="submit" class="btn btn-auth-submit">로그인</button>
      </form>
      
      <!-- Signup Form -->
      <form id="form-signup" class="auth-form hidden">
        <div class="auth-input-group">
          <label for="signup-email">이메일 주소</label>
          <input type="email" id="signup-email" required placeholder="example@email.com">
        </div>
        <div class="auth-input-group">
          <label for="signup-password">비밀번호</label>
          <input type="password" id="signup-password" required placeholder="비밀번호(6자 이상) 입력">
        </div>
        <div class="auth-input-group">
          <label for="signup-confirm-password">비밀번호 확인</label>
          <input type="password" id="signup-confirm-password" required placeholder="비밀번호를 다시 입력하세요">
        </div>
        <button type="submit" class="btn btn-auth-submit">회원가입</button>
      </form>
      
      <div class="auth-divider">
        <span>또는</span>
      </div>
      
      <!-- Google Sign In Button -->
      <button id="btn-google-login" class="btn btn-google">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24c0-1.63-.15-3.2-.43-4.75H24v9h12.75c-.55 3-2.25 5.54-4.8 7.25l7.47 5.79C43.79 37.1 46.5 31.2 46.5 24z"/>
          <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.47-5.79c-2.07 1.38-4.72 2.2-8.42 2.2-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span>Google 계정으로 로그인</span>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
